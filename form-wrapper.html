<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { background: transparent; width: 100%; height: auto; min-height: 0; overflow: hidden; }

        #thank-you {
            display: none;
            text-align: center;
            padding: 80px 40px;
            font-family: 'Poppins', sans-serif;
        }
        #thank-you .icon { font-size: 48px; margin-bottom: 20px; color: #ffffff; }
        #thank-you h3 { font-size: 28px; font-weight: 700; color: #ffffff; margin-bottom: 16px; }
        #thank-you p { color: rgba(255,255,255,0.65); font-size: 16px; max-width: 420px; margin: 0 auto 32px; }
        #thank-you .sig { color: #E05C6F; font-weight: 600; font-size: 15px; }
    </style>
</head>
<body>

    <iframe
        src="https://api.darkhorseva.net/widget/form/CmNhKeH127nthMLD4Lw2"
        id="ghl-iframe"
        style="width:100%;height:1500px;border:none;display:block;"
        title="Contact Form"
        scrolling="no"
    ></iframe>

    <div id="thank-you">
        <div class="icon">✦</div>
        <h3>You're all set!</h3>
        <p>I'll be in touch within 48 hours to talk through your project. Talk soon.</p>
        <p class="sig">— Krys</p>
    </div>

    <script>
        const ghlFrame = document.getElementById('ghl-iframe');
        const thankYou = document.getElementById('thank-you');
        let submitted  = false;
        let loads      = 0;

        const showThankYou = () => {
            if (submitted) return;
            submitted = true;
            ghlFrame.style.display = 'none';
            thankYou.style.display = 'block';
            window.parent.postMessage({ type: 'ghlFormSubmitted', height: 400 }, '*');
        };

        // Method 1: second load = GHL navigated to thank-you page
        ghlFrame.addEventListener('load', () => {
            loads++;
            if (loads > 1) showThankYou();
        });

        // Method 2: postMessage — catch GHL height updates AND submission signals
        let peakHeight = 0;
        let heightStable = false;
        window.addEventListener('message', (e) => {
            try {
                console.log('GHL msg:', JSON.stringify(e.data));
                const d = typeof e.data === 'string' ? JSON.parse(e.data) : e.data;
                if (!d) return;
                const s = JSON.stringify(d).toLowerCase();

                // Submission signal — GHL sends "set-sticky-contacts" when a lead is collected
                if (s.includes('set-sticky-contacts') || s.includes('submitted') || s.includes('thankyou') || s.includes('thank_you')) {
                    showThankYou();
                    return;
                }

                // Height message from GHL
                const h = d.height || (d.data && d.data.height);
                if (h && !submitted) {
                    const px = parseInt(h);
                    if (px > 100) {
                        // If height drops significantly after stabilising = thank you page
                        if (heightStable && px < peakHeight * 0.75) {
                            showThankYou();
                            return;
                        }
                        ghlFrame.style.height = px + 'px';
                        window.parent.postMessage({ type: 'ghlResize', height: px }, '*');
                        if (px >= peakHeight) {
                            peakHeight = px;
                            // Mark stable after height settles for 3s
                            clearTimeout(window._stableTimer);
                            window._stableTimer = setTimeout(() => { heightStable = true; }, 3000);
                        }
                    }
                }
            } catch(err) {}
        });

        // Method 3: poll ghlFrame.style.height for a drop after it stabilises
        let pollPeak = 0;
        let pollStable = false;
        setInterval(() => {
            if (submitted) return;
            const px = parseInt(ghlFrame.style.height) || 0;
            if (px > pollPeak) { pollPeak = px; }
            if (pollPeak > 200 && !pollStable) {
                pollStable = true;
                setTimeout(() => {}, 3000); // let it settle
            }
            if (pollStable && px > 0 && px < pollPeak * 0.75) showThankYou();
        }, 500);
    </script>

</body>
</html>
